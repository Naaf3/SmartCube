## Originaly written by Smarty Van https://www.youtube.com/@SmartyVan
## Adapted by Alfred the SmartCamper
## This configuration is for the M5Stack Core2 v1.1 device, which is used as a display for water tank levels and controls.
## https://docs.m5stack.com/en/core/Core2%20v1.1
## Using screen rotation reset for ili9xxx here: https://github.com/esphome/esphome/pull/10659 


substitutions:
  devicename: smartcube
  upper_devicename: SmartCube

esphome:
  name: ${devicename}
  friendly_name: ${upper_devicename}
  platformio_options:
    upload_speed: 921600
  on_boot:
    - priority: 600
      then:
        - lambda: |-
            // Set Gamma Curve Select (1 = gamma 2.2, 2 = gamma 1.8, 4 = gamma 2.5, 8 = gamma 1.0)
            {
              const uint8_t data[] = {0x02};
              id(main_display).send_command(0x26, data, 1);
            }
        # - script.execute: screen_off_timeout
        - lambda: |-
            id(axp_comp).set_blue_led(true);
            //id(axp_comp).set_speaker_enabled(true);

esp32:
  board: m5stack-core2
  framework:
    type: arduino

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  fast_connect: true
  ap:
    ssid: $devicename Fallback Hotspot
    password: !secret wifi_password


captive_portal:

logger:
  level: DEBUG
  logs:
    mpu6886: ERROR
    display: DEBUG
    sensor: ERROR
    binary_sensor: INFO
    axp2101: DEBUG
    axp2101.sensor: DEBUG
    wifi: DEBUG
    light: ERROR
    preferences: DEBUG

api:
  on_client_connected:
    - if:
        condition:
          lambda: 'return (0 == client_info.find("Home Assistant "));'
        then:
          - globals.set:
              id: connected_to_hass
              value: 'true'
          - lvgl.widget.show: ${devicename}_hastatus
          - lvgl.widget.hide: boot_screen
          - script.execute: lvgl_restart_idle
          - if:
              condition:
                light.is_on: display_backlight
              then:
                - light.turn_on:
                    id: side_lights
                    brightness: !lambda 'return std::max(0.20f, id(display_backlight).current_values.get_brightness());'
                    red: 0%
                    green: 10%
                    blue: 90%
                    effect: Water Tank Levels
              else:
                - light.turn_off: side_lights
  on_client_disconnected:
    - if:
        condition:
          lambda: 'return (0 == client_info.find("Home Assistant "));'
        then:
          - globals.set:
              id: connected_to_hass
              value: 'false'
          - lvgl.widget.hide: ${devicename}_hastatus

ota:
  - platform: esphome
    password: ota

psram:
  mode: quad
  speed: 80MHz

external_components:
  - source: github://SmartyVan/esphome-axp2101
    components: [ axp2101 ]
  - source: github://pr#10659
    components: [ili9xxx]
    refresh: 1h

spi:
  clk_pin: GPIO18
  mosi_pin: GPIO23

i2c:
  - id: bus_a
    sda: GPIO21
    scl: GPIO22

globals:
  - id: battery_is_charging
    type: bool
    restore_value: no
    initial_value: 'false'
  - id: current_brightness
    type: float
    restore_value: no
    initial_value: '0.50'
  - id: avoid_sleep
    type: bool
    restore_value: no
    initial_value: 'false'
  - id: connected_to_hass
    type: bool
    restore_value: no
    initial_value: 'false'

i2s_audio:
  i2s_lrclk_pin: GPIO0
  i2s_bclk_pin: GPIO12

media_player:
  - platform: i2s_audio
    id: media_player_i2c
    name: Media Player
    dac_type: external
    i2s_dout_pin: GPIO2
    mode: mono

image:
  - file: "images/alfred.png"
    id: boot_screen_image
    type: RGB565
  - file: "images/alfred_side_s.png"
    id: alfred_side_s
    type: RGB565
  - file: "images/alfred_back_s.png"
    id: alfred_back_s
    type: RGB565

sensor:
  - platform: axp2101
    model: M5CORE2
    address: 0x34
    id: axp_comp
    i2c_id: bus_a
    update_interval: never
    brightness: 50%
    battery_voltage:
      name: "Battery Voltage"
      id: battery_voltage
      device_class: Voltage
      unit_of_measurement: "V"
      state_class: measurement
    battery_level:
      name: "Battery Level"
      id: battery_level_id
      device_class: battery
      unit_of_measurement: "%"
      state_class: measurement
      on_value:
        - lvgl.label.update:
            id: battery_status_label
            text:
              format: "%0.0f%%"
              args: [id(battery_level_id).state]
        - lvgl.label.update:
            id: battery_status
            text: !lambda |-
              static char buf[10];
              std::string icon;
              if (id(battery_is_charging)) {
                  icon = "\U000F0084"; // mdi-battery-charging
              } else if(x == 100.0) {
                  icon = "\U000F0079"; // mdi-battery (full)
              } else if (x > 90) {
                  icon = "\U000F0082"; // mdi-battery-90
              } else if (x > 80) {
                  icon = "\U000F0081"; // mdi-battery-80
              } else if (x > 70) {
                  icon = "\U000F0080"; // mdi-battery-70
              } else if (x > 60) {
                  icon = "\U000F007F"; // mdi-battery-60
              } else if (x > 50) {
                  icon = "\U000F007E"; // mdi-battery-50
              } else if (x > 40) {
                  icon = "\U000F007D"; // mdi-battery-40
              } else if (x > 30) {
                  icon = "\U000F007C"; // mdi-battery-30
              } else if (x > 20) {
                  icon = "\U000F007B"; // mdi-battery-20
              } else if (x > 10) {
                  icon = "\U000F007A"; // mdi-battery-10
              } else if (x > 0) {
                  icon = "\U000F008E"; // mdi-battery-outline
              } else {
                  icon = "\U000F0091"; // mdi-battery-unknown
              }
              snprintf(buf, sizeof(buf), "%s", icon.c_str());
              return buf;
    battery_charging:
      name: "Battery Charging"
      id: battery_charging
      on_state:
        then:
          - lambda: |-
              id(battery_is_charging) = x > 0.5;
          - if:
              condition:
                and:
                  - lvgl.is_paused:
                  - lambda: 'return id(battery_is_charging);'
              then:
                - lvgl.resume:
                - lvgl.widget.redraw:
                - light.turn_on: display_backlight
  - platform: mpu6886
    address: 0x68
    id: mpu_comp
    update_interval: never
    accel_x:
      id: accel_x
      # internal: true
      filters:
        - offset: 0.1 # calibrate to 0g at rest
        - exponential_moving_average:
            alpha: 0.3
            send_every: 1
    accel_y:
      id: accel_y
      # internal: true
      filters:
        - offset: 0.1 # calibrate to 0g at rest
        - exponential_moving_average:
            alpha: 0.3
            send_every: 1
      # on_value:
      #   then:
      #     - lambda: |-
      #         ESP_LOGI("accel_y", "accel_y value: %.3f", x);
    accel_z:
      id: accel_z
      # internal: true
      filters:
        - offset: -0.8 # calibrate to 0g at rest
        - exponential_moving_average:
            alpha: 0.3
            send_every: 1
  - platform: template
    id: winkel
    name: "Winkel"
    unit_of_measurement: "°"
    accuracy_decimals: 2

  ## WATER %
  - platform: homeassistant
    entity_id: sensor.frischwasser_volume
    id: ha_water_tank
    on_value:
      then:
        - lvgl.arc.update:
            id: water_arc
            value: !lambda 'return id(ha_water_tank).state;'
        - lvgl.label.update:
            id: water_label_value
            text:
              format: "%0.0f%%"
              args: [id(ha_water_tank).state]
        - lvgl.arc.update:
            id: water_arc_2
            value: !lambda 'return id(ha_water_tank).state;'
        - lvgl.label.update:
            id: water_label_value_2
            text:
              format: "%0.0f %%"
              args: [id(ha_water_tank).state]
        - if:
            condition: 
              api.connected:
            then:
              - if:
                  condition:
                    and:
                      - lambda: 'return id(ha_water_tank).state > 73;'
                      - lambda: 'return id(device_inverted).state;'

                  then:
                    - light.turn_on:
                        id: side_lights
                        red: 100%
                        green: 100%
                        blue: 100%
                        effect: Flash
                  else:
                    - if:
                        condition:
                          light.is_on: display_backlight
                        then:
                          - light.turn_on:
                              id: side_lights
                              brightness: !lambda 'return std::max(0.20f, id(display_backlight).current_values.get_brightness());'
                              effect: Water Tank Levels

  ## Toilette %
  - platform: homeassistant
    entity_id: sensor.fullstand_toilette
    id: ha_toilette
    on_value:
      then:
        - lvgl.arc.update:
            id: toilette_arc
            value: !lambda 'return id(ha_toilette).state;'
        - lvgl.arc.update:
            id: toilette_arc
            value: !lambda 'return id(ha_toilette).state;'
        - lvgl.label.update:
            id: toilette_label_value
            text:
              format: "%0.0f%%"
              args: [id(ha_toilette).state]
        - lvgl.label.update:
            id: toilette_label_value
            text:
              format: "%0.0f %%"
              args: [id(ha_toilette).state]

  ## BATTERY %
  - platform: homeassistant
    entity_id: sensor.smartshunt_alfred_battery
    id: ha_battery_soc
    on_value:
      then:
        - lvgl.arc.update:
            id: battery_arc
            value: !lambda 'return id(ha_battery_soc).state;'
        - lvgl.label.update:
            id: battery_label_value
            text:
              format: "%0.0f %%"
              args: [id(ha_battery_soc).state]

  ## DIESEL %
  - platform: homeassistant
    entity_id: sensor.wican_fuel_level_saved
    id: ha_diesel_level
    on_value:
      then:
        - lvgl.arc.update:
            id: diesel_arc
            value: !lambda 'return id(ha_diesel_level).state;'
        - lvgl.label.update:
            id: diesel_label_value
            text:
              format: "%0.0f %%"
              args: [id(ha_diesel_level).state]
              
  ## AdBlue %
  - platform: homeassistant
    entity_id: sensor.wican_adblue_level
    id: ha_adblue_level
    on_value:
      then:
        - lvgl.arc.update:
            id: adblue_arc
            value: !lambda 'return id(ha_adblue_level).state;'
        - lvgl.label.update:
            id: adblue_label_value
            text:
              format: "%0.0f %%"
              args: [id(ha_adblue_level).state]
              
  ## BATTERY %
  - platform: homeassistant
    entity_id: sensor.smartshunt_alfred_starter_battery_voltage
    id: ha_starterbattery_soc
    on_value:
      then:
#        - lvgl.arc.update:
#            id: starterbattery_arc
#            value: !lambda 'return id(ha_starterbattery_soc).state;'
        - lvgl.label.update:
            id: starterbattery_label_value
            text:
              format: "%0.1f V"
              args: [id(ha_starterbattery_soc).state]
              
   ## X Accel %
  - platform: homeassistant
    entity_id: sensor.filtered_x_angle
    id: ha_x_angle
    on_value:
      then:
        - lvgl.label.update:
            id: x_angle_value
            text:
              format: "%0.1f°%"
              args: [id(ha_x_angle).state]
              
   ## Y Accel %
  - platform: homeassistant
    entity_id: sensor.filtered_y_angle
    id: ha_y_angle
    on_value:
      then:
        - lvgl.label.update:
            id: y_angle_value
            text:
              format: "%0.1f°%"
              args: [id(ha_y_angle).state]
              
   ## Rotation Image Alfred Back %
  - platform: homeassistant
    id: ha_x_angle_2
    entity_id: number.filtered_x_angle_num
    internal: true
    on_value:
      then:
        - lambda: |-
            ESP_LOGI("DEBUG", "Sensorwert: %.2f", id(ha_x_angle_2).state);
        - lvgl.image.update:
            id: alfred_back_rot
            angle: !lambda |-
              float v = id(ha_x_angle_2).state;
              float angle = (v / 100.0) * 100.0 - 5.0;
              ESP_LOGI("DEBUG", "Winkel: %.2f", angle);
              return angle;
   ## Rotation Image Alfred Side %
  - platform: homeassistant
    id: ha_y_angle_2
    entity_id: number.filtered_y_angle_num
    internal: true
    on_value:
      then:
        - lambda: |-
            ESP_LOGI("DEBUG", "Sensorwert: %.2f", id(ha_y_angle_2).state);
        - lvgl.image.update:
            id: alfred_side_rot
            angle: !lambda |-
              float v = id(ha_y_angle_2).state;
              float angle = (v / 100.0) * 100.0 - 5.0;
              ESP_LOGI("DEBUG", "Winkel: %.2f", angle);
              return angle;

