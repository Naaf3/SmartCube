display:
  - platform: ili9xxx
    model: M5STACK
    id: main_display
    cs_pin: GPIO5
    dc_pin: GPIO15
    dimensions: 320x240
    data_rate: 40MHz
    invert_colors: true
    auto_clear_enabled: false
    update_interval: never

## LVGL UI
lvgl:
  touchscreens:
    touchscreen_id: touch_screen
  on_idle:
    - timeout: 10sec
      then:
        - logger.log: "Dimming screen..."
        - if:
            condition:
              and:
                - lambda: 'return !id(device_inverted).state;'
                - lambda: 'return id(connected_to_hass);'
            then:
              - light.control:
                  id: display_backlight
                  brightness: !lambda 'return (id(display_backlight).current_values.get_brightness() / 2);'
              - light.control:
                  id: side_lights
                  brightness: !lambda 'return std::max(0.20f, (id(display_backlight).current_values.get_brightness() / 2));'
    - timeout: 20sec
      then:
        - logger.log: "Turning off screen..."
        - if:
            condition:
              and:
                - lambda: 'return !id(device_inverted).state;'
                - lambda: 'return id(connected_to_hass);'
            then:
              - light.turn_off: display_backlight
              - light.turn_off: side_lights
    - timeout: 30min
      then:
        - logger.log: "Sleep timeout triggered..."
        - if:
            condition:
              and:
                - lambda: 'return !id(device_inverted).state;'
                - lambda: 'return !id(ha_van_running).state;'
                - lambda: 'return !id(battery_voltage_high).state;'
            then:
              - logger.log: "Entering deep sleep..."
              - delay: 1s
              - wifi.disable:
              - lambda: 'id(axp_comp).set_blue_led(false);'
              - lambda: 'id(axp_comp).set_speaker_enabled(false);'
              - light.turn_off: side_lights
              - light.turn_off: display_backlight
              - lvgl.pause:
              - lambda: 'id(axp_comp).DeepSleep(0);'

  top_layer:
    widgets:
      - label:
          text: "\uF1EB"
          id: ${devicename}_hastatus
          hidden: true
          align: top_right
          x: -8
          y: 4
          text_align: right
          text_color: 0x808080
      - label:
          text: "\U000F0091" # start with mdi-battery-unknown
          id: battery_status
          hidden: false
          align: top_left
          x: 8
          y: 4
          text_align: left
          text_color: 0x808080
          text_font: battery_icons_20
          widgets:
            - label:
                text: '35%'
                id: battery_status_label
                align_to:
                  id: battery_status
                  align: OUT_RIGHT_MID
                  x: -10
                text_color: 0x808080
                text_font: roboto_small
      - obj:
          id: boot_screen
          x: 0
          y: 0
          width: 100%
          height: 100%
          bg_color: 0xffffff
          bg_opa: COVER
          radius: 0
          pad_all: 0
          border_width: 0
          widgets:
            - image:
                align: CENTER
                src: boot_screen_image
            - spinner:
                align: CENTER
                y: 90
                height: 40
                width: 40
                spin_time: 1s
                arc_length: 60deg
                arc_width: 8
                indicator:
                  arc_color: 0x18bcf2
                  arc_width: 8
          on_press:
            - lvgl.widget.hide: boot_screen
  pages:
    - id: overview_page
      width: 320
      height: 240
      pad_top: 25
      border_opa: TRANSP
      scrollbar_mode: "OFF"
      bg_color: white
      on_swipe_left:
        - lvgl.page.next:
            animation: OUT_LEFT
            time: 200ms
      on_swipe_right:
        - lvgl.page.previous:
            animation: OUT_RIGHT
            time: 200ms
      widgets:
        ## WATER ARC
        - arc:
            id: water_arc
            x: 5
            y: 15
            width: 100
            height: 100
            pad_all: 0
            arc_width: 14
            indicator:
              arc_color: blue
              arc_width: 14
            widgets:
              - label:
                  id: water_label
                  align: CENTER
                  text_align: CENTER
                  y: -8
                  text: "Wasser"
                  text_font: roboto
              - label:
                  id: water_label_value
                  width: 80
                  text_align: CENTER
                  text: "Wasser"
                  align_to:
                    id: water_label
                    align: OUT_BOTTOM_MID
        ## Toilette ARC
        - arc:
            id: toilette_arc
            x: 110
            y: 15
            width: 100
            height: 100
            pad_all: 0
            indicator:
              arc_color: brown
              arc_width: 14
            arc_width: 14
            widgets:
              - label:
                  id: toilette_label
                  align: CENTER
                  text_align: CENTER
                  y: -8
                  text: "Toilette"
                  text_font: roboto
              - label:
                  id: toilette_label_value
                  width: 80
                  text_align: CENTER
                  text: "Toilette"
                  align_to:
                    id: toilette_label
                    align: OUT_BOTTOM_MID
        
        ## BATTERY ARC
        - arc:
            id: battery_arc
            x: 215
            y: 15
            width: 105
            height: 105
            pad_all: 0
            indicator:
              arc_color: lightcoral
              arc_width: 14
            arc_width: 14
            widgets:
              - label:
                  id: battery_label
                  align: CENTER
                  text_align: CENTER
                  y: -8
                  text: "Batterie"
                  text_font: roboto
              - label:
                  id: battery_label_value
                  width: 80
                  text_align: CENTER
                  text: "Batterie"
                  align_to:
                    id: battery_label
                    align: OUT_BOTTOM_MID
        
        ## DIESEL ARC
        - arc:
            id: diesel_arc
            x: 5
            y: 120
            width: 100
            height: 100
            pad_all: 0
            indicator:
              arc_color: "0xFF00FF"
              arc_width: 14
            arc_width: 14
            widgets:
              - label:
                  id: diesel_label
                  align: CENTER
                  text_align: CENTER
                  y: -8
                  text: "Diesel"
                  text_font: roboto
              - label:
                  id: diesel_label_value
                  width: 80
                  text_align: CENTER
                  text: "Diesel"
                  align_to:
                    id: diesel_label
                    align: OUT_BOTTOM_MID                    
        
        ##AdBlue ARC
        - arc:
