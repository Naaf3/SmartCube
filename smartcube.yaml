number:
  - platform: template
    name: "Max Brightness"
    id: max_brightness
    optimistic: true
    restore_value: true
    min_value: 10
    max_value: 100
    step: 1.0
    initial_value: 100
    unit_of_measurement: "%"
    mode: slider
    entity_category: "config"
    on_value:
      then:
        - delay: 100ms
        - if:
            condition:
              light.is_on: display_backlight
            then:
              - light.control:
                  id: display_backlight
                  brightness: !lambda 'return x / 100.0;'

light:
  - platform: monochromatic
    name: "Display Backlight"
    id: display_backlight
    output: display_output
    default_transition_length: 0ms
    on_turn_off:
      then:
        - lambda: |-
            id(main_display).set_update_interval(0);
            id(axp_comp).set_lcd_enabled(false);
            //id(axp_comp).set_speaker_enabled(false);
            // Panel: Display OFF (0x28), then Sleep IN (0x10)
            id(main_display).send_command(0x28, nullptr, 0);
            delay(20);
            id(main_display).send_command(0x10, nullptr, 0);
    on_turn_on:
      then:
        - lambda: |-
            float level = id(display_backlight).current_values.get_brightness();  // 0.0–1.0
            // Panel: Sleep OUT (0x11), then Display ON (0x29)
            id(main_display).send_command(0x11, nullptr, 0);
            delay(120);  // datasheet recommends >=120 ms after sleep out
            id(main_display).send_command(0x29, nullptr, 0);
            id(axp_comp).set_lcd_enabled(true);
            id(axp_comp).set_brightness(level);
            id(main_display).set_update_interval(250);
            //id(axp_comp).set_speaker_enabled(true);
            id(axp_comp).update();

  - platform: neopixelbus
    id: side_lights
    pin: GPIO25
    variant: SK6812
    num_leds: 10
    type: GRB
    name: "Side Lights"
    restore_mode: RESTORE_DEFAULT_OFF
    initial_state:
      brightness: 50%
    default_transition_length: 0ms
    # color_correct: [70%, 70%, 70%]  # Adjust color correction if needed
    effects:
      - addressable_lambda:
          name: "Water Tank Levels"
          update_interval: 250ms
          lambda: |-
            auto value = id(ha_water_tank).state;
            float min_val = 1.0;   // minimum percentage for first LED
            float max_val = 75.0;  // maximum percentage for last LED
            float step = (max_val - min_val) / 5.0;

            bool inverted = id(device_inverted).state;
            for (int i = 0; i < 5; i++) {
              int idx, left_idx;
              if (inverted) {
                idx = i;           // right side: bottom (0) to top (4) when inverted
                left_idx = 9 - i;  // left side: bottom (9) to top (5) when inverted
              } else {
                idx = 4 - i;       // right side: bottom (4) to top (0)
                left_idx = 5 + i;  // left side: bottom (5) to top (9)
              }
              float threshold = min_val + step * i;
              if (value >= threshold) {
                it[idx] = Color(0, 26, 230);      // right side
                it[left_idx] = Color(0, 26, 230); // left side
              } else {
                it[idx] = Color(0, 0, 0);        // off
                it[left_idx] = Color(0, 0, 0);   // off
              }
            }
      - strobe:
          name: "Flash"
          colors:
            - state: true
              brightness: 100%
              red: 100%
              green: 100%
              blue: 90%
              duration: 500ms
            - state: false
              duration: 500ms
      - pulse:
          name: "Offline"
          transition_length: 2.0s
          update_interval: 2.0s
          min_brightness: 20%
          max_brightness: 60%

output:
  - platform: template
    type: float
    write_action: 
      then:
        - lambda: |-
            id(axp_comp).set_brightness(id(display_backlight).current_values.get_brightness());
            id(axp_comp).update();
    id: display_output

touchscreen:
  - platform: ft63x6
    id: touch_screen
    i2c_id: bus_a
    on_touch:
      - script.execute: wake_up_screen


binary_sensor:
  ## BATTERY VOLTAGE HIGH - from charging base
  - platform: template
    name: "Battery Voltage High"
    id: battery_voltage_high
    lambda: |-
      return (id(battery_voltage).state > 3.8);
    filters:
      - delayed_on: 60s
      - delayed_off: 60s
    on_release:
      then:
        - script.execute: lvgl_restart_idle

  ## VAN RUNNING
  - platform: homeassistant
    entity_id: binary_sensor.van_running
    id: ha_van_running
    on_press:
      - logger.log: "Van started!"
      - script.execute: wake_up_screen
    on_release:
      - logger.log: "Van stopped!"
      - script.execute: lvgl_restart_idle

  ## DEVICE INVERTED
  - platform: template
    name: "Device Inverted"
    id: device_inverted
    lambda: |-
      float y = id(accel_y).state;
      return (y < -8.0);
    filters:
      - delayed_off: 250ms
    on_press:
      then:
        - media_player.volume_set:
            id: media_player_i2c
            volume: 100%
        - script.execute: wake_up_screen
        - light.turn_on:
            id: display_backlight
            brightness: !lambda 'return id(max_brightness).state / 100;'
        - light.turn_on:
            id: side_lights
            brightness: !lambda 'return id(max_brightness).state / 100;'
        - lvgl.page.show:
            id: water_filling_page
            animation: MOVE_TOP
            time: 300ms
        - lambda: |-
            id(main_display)->set_mirror_x(true);
            id(main_display)->set_mirror_y(true);
    on_release:
      then:
        - lambda: |-
            id(main_display)->set_mirror_x(false);
            id(main_display)->set_mirror_y(false);
        - media_player.volume_set:
            id: media_player_i2c
            volume: 0%
        - script.execute: update_rotation_ui

  ## LEFT TOUCH - PREVIOUS PAGE
  - platform: touchscreen
    name: Left Touch Button
    x_min: 10
    x_max: 120
    y_min: 240
    y_max: 280
    use_raw: true
    on_press:
      then:
        - lvgl.page.previous:
            animation: MOVE_RIGHT
            time: 200ms

  ## MIDDLE TOUCH - BRIGHTNESS CONTROL
  - platform: touchscreen
    name: Middle Touch Button
    on_press:
      then:
        - lambda: |-
            float max_b = id(max_brightness).state / 100.0;
            float step = (max_b - 0.25f) / 3.0f;
            float levels[] = {0.25f, 0.25f + step, 0.25f + 2 * step, max_b};
            float current = id(current_brightness);
            int idx = 0;
            // Find the closest level >= current, then step to next
            for (int i = 0; i < 4; i++) {
              if (current <= levels[i] + 0.01) { idx = i; break; }
            }
            idx = (idx + 1) % 4;
            id(current_brightness) = levels[idx];
        - light.turn_on:
            id: display_backlight
            brightness: !lambda 'return id(current_brightness);'
        - light.turn_on:
            id: side_lights
            brightness: !lambda 'return std::max(0.20f, id(display_backlight).current_values.get_brightness());'
    x_min: 130
    x_max: 200
    y_min: 240
    y_max: 280
    use_raw: true
  
  ## RIGHT TOUCH - NEXT PAGE
  - platform: touchscreen
    name: Right Touch Button
    id: right_button
    x_min: 230
    x_max: 310
    y_min: 240
    y_max: 280
    use_raw: true
    on_press:
      then:
        - lvgl.page.next:
            animation: MOVE_LEFT
            time: 200ms

interval:
  # occaisional battery updates
  - interval: 5min
    then:
      - component.update: axp_comp
  # frequent updates when screen on
  - interval: 30s
    then:
      - if:
          condition:
            light.is_on: display_backlight
          then:
            - component.update: axp_comp
  # mpu updates
  - interval: 100ms
    then:
      - component.update: mpu_comp

script:
  ## WAKE UP SCREEN
  - id: wake_up_screen
    mode: restart
    then:
      - logger.log: "Running Wake Up Screen Script..."
      # ENABLE WIFI
      - if:
          condition: 
            not:
              wifi.enabled
          then:
            - wifi.enable:
      - script.execute: lvgl_restart_idle
      - lambda: 'id(axp_comp).set_blue_led(true);'
      ## LIGHTS ON
      - if:
          condition:
            and:
              - lambda: 'return !id(device_inverted).state;'
          then:
            - light.turn_on:
                id: display_backlight
                brightness: !lambda 'return id(current_brightness);'
      - if:
          condition:
            lambda: 'return id(connected_to_hass);'
          then:
            - if:
                condition:
                  and:
                    - lambda: 'return !id(device_inverted).state;'
                then:
                  - light.turn_on:
                      id: side_lights
                      brightness: !lambda 'return std::max(0.20f, id(display_backlight).current_values.get_brightness());'
                      effect: Water Tank Levels
                else:
                  - light.turn_on:
                      id: side_lights
                      effect: Water Tank Levels
          else:
            - light.turn_on:
                id: side_lights
                brightness: !lambda 'return std::max(0.20f, id(display_backlight).current_values.get_brightness());'
                red: 100%
                green: 0%
                blue: 0%
                effect: Offline

  ## RESTART LVGL IDLE TIMER
  - id: lvgl_restart_idle
    mode: restart
    then:
      - if:
          condition:
            lvgl.is_paused:
          then:
            - lvgl.resume:
            - lvgl.widget.redraw:
      - lambda: 'lv_disp_trig_activity(NULL);' # reset LVGL idle timer
  
  ## UPDATE SCREEN ROTATION UI
  - id: update_rotation_ui
    mode: restart
    then:
      - delay: 1s # wait for any screen rotation to complete
      - if:
          condition:
            and:
              - lambda: 'return !id(device_inverted).state;'
          then:
            - lvgl.page.show:
                id: overview_page
                animation: MOVE_BOTTOM
                time: 300ms
            - script.execute: wake_up_screen
            - script.execute: lvgl_restart_idle
